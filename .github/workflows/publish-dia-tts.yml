name: publish-dia-tts

on:
  push:
    branches: [main]
    paths:
      - "dia-tts/**"
      - ".github/workflows/publish-dia-tts.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Python (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          src: dia-tts

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dia-tts/Dockerfile

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU torch + worker deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r dia-tts/requirements.txt pytest
        env:
          PYTHONPATH: dia-tts

      - name: Run tests
        run: pytest dia-tts/tests/ -v --tb=short
        env:
          PYTHONPATH: dia-tts

  build-and-push:
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      sha_tag: ghcr.io/${{ github.repository_owner }}/dia-tts:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dia-tts
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dia-tts
          file: dia-tts/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Update RunPod template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_TEMPLATE_ID: ${{ secrets.RUNPOD_DIA_TTS_TEMPLATE_ID }}
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/dia-tts:sha-${{ github.sha }}
        run: python .github/scripts/update_runpod_template.py
